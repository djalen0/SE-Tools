<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pinning Sheet Editor</title>
<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta name="theme-color" content="#4f46e5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Pinning Sheets">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-show-slug="{{ show.slug }}" data-date-slug="{{ date_slug }}">
<div class="app-shell">
  <div class="mobile-topbar">
    <button id="menuToggleBtn" class="menu-toggle" aria-label="Open menu">&#9776; Menu</button>
    <nav class="breadcrumb">
      <a href="/">Home</a>
      <span class="crumb-sep">/</span>
      <a href="/{{ show.slug }}">{{ show.name }}</a>
      <span class="crumb-sep">/</span>
      <select class="date-switcher"></select>
    </nav>
  </div>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <!-- View-only + mobile only (see body.view-only rules in style.css) --
       a compact, absolutely-positioned stand-in for the full menu/sidebar,
       so a viewer just sees the show name/venue/date without a hamburger
       menu or any editing controls, and without the header reserving
       permanent scroll-locked space the way the editor's sticky topbar
       does. Populated in app.js's render() alongside printHeader. -->
  <div class="view-only-topbar" id="viewOnlyTopbar">
    <nav class="breadcrumb">
      <a href="/">Home</a>
      <span class="crumb-sep">/</span>
      <a href="/{{ show.slug }}">{{ show.name }}</a>
    </nav>
    <div class="vo-title" id="voTitle"></div>
    <div class="vo-meta" id="voMeta"></div>
    <!-- The two interactive things a view-only visitor needs reachable
         without a hamburger menu/sidebar (neither exists in this mode,
         see the comment above). Data tags toggles the same #dataTagsPanel
         as the sidebar's own Data tags button (see app.js), just from
         here. Export PDF calls the same exportPrintMobile() the sidebar's
         own "Export PDF (mobile)…" button does -- without this, a
         view-only visitor on a phone had no way to export a PDF at all,
         since the entire sidebar (where every other export button lives)
         is hidden in this mode. -->
    <div class="vo-actions">
      <button id="dataTagsToggleBtnVO" class="btn btn-ghost vo-data-tags-btn" type="button">Data tags&hellip;</button>
      <button id="printMobileBtnVO" class="btn btn-ghost vo-data-tags-btn" type="button">Export PDF&hellip;</button>
    </div>
  </div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-header-top">
        <nav class="breadcrumb">
          <a href="/">Home</a>
          <span class="crumb-sep">/</span>
          <a href="/{{ show.slug }}">{{ show.name }}</a>
          <span class="crumb-sep">/</span>
          <select class="date-switcher"></select>
        </nav>
        <button id="menuCloseBtn" class="menu-close" aria-label="Close menu">&times;</button>
      </div>
    </div>
    <!-- Rename/reorder each hang -- a shared-job edit like Colors/Circuit
         numbering, so it's locked for view-only visitors too. See
         renderHangsPanel in app.js. Kept first (and open by default,
         display:block below), and expands right in place here (see
         #hangsPanel in style.css) rather than flying out like the panels
         below -- a crew has this open constantly while working through a
         rig, so it stays anchored to its own button instead of living in
         a separate dock. -->
    <div class="toolbar-actions">
      <button id="hangsToggleBtn" class="btn btn-ghost">Hangs&hellip;</button>
    </div>
    <div id="hangsPanel" class="settingsPanel" style="display:block;"></div>
    <label id="uploadLabel" class="upload-label">Upload sheet<input id="uploadInput" type="file" accept=".pdf,.txt"></label>
    <!-- Page design is a menu, not just a panel -- Cards per row/Strip
         labels live here directly, and Data tags/Circuit numbering/
         Colors/Data bar each get their own button that flies out a
         second column further right (see the body.view-only rules in
         style.css: unlike the rest of this panel, Page design's own
         button+flyout stay reachable for view-only visitors, so Data
         tags -- never locked, see its own comment below -- is still
         reachable there; Colors/Circuit numbering/Data bar/Cards per
         row/Strip labels are individually hidden inside it instead). -->
    <div class="toolbar-actions">
      <button id="pageDesignToggleBtn" class="btn btn-ghost">Page design&hellip;</button>
    </div>
    <div id="pageDesignPanel" class="settingsPanel" style="display:none;">
      <label id="cardsPerRowField" class="field-inline">Cards per row<input id="cardsPerRow" type="number" min="1" max="6"></label>
      <label id="stripPairLabelsField" class="field-checkbox"><input id="stripPairLabelsInput" type="checkbox"> Strip &quot;(Pair)&quot; from hang titles</label>
      <!-- For an editor, sets this Date's Data Tags overrides on top of
           the Show's own default (see the Show page). For a view-only
           visitor, renders a different, device-local panel instead (see
           renderDataTagsPanel/renderLocalDataTagsPanel in app.js) -- so
           unlike Colors/Circuit numbering/Data bar below, this button
           itself is never locked (see the body.view-only rules in
           style.css). -->
      <div class="toolbar-actions">
        <button id="dataTagsToggleBtn" class="btn btn-ghost">Data tags&hellip;</button>
      </div>
      <div class="toolbar-actions">
        <button id="numberingToggleBtn" class="btn btn-ghost">Circuit numbering&hellip;</button>
        <button id="colorToggleBtn" class="btn btn-ghost">Colors&hellip;</button>
      </div>
      <!-- Nested right after their own buttons (not left at the bottom of
           the sidebar) same as #dataBarPanel below -- on mobile these are
           plain in-flow blocks, not the position:fixed flyouts they
           become at desktop widths (see .settingsPanel in style.css), so
           where they actually sit in the DOM is what decides where the
           revealed content appears on a phone. Leaving them far from
           their buttons meant opening Circuit numbering/Colors on mobile
           silently expanded something off-screen at the very bottom of
           the sidebar instead of right where you were looking. -->
      <div id="numberingPanel" class="settingsPanel" style="display:none;"></div>
      <div id="colorPanel" class="settingsPanel" style="display:none;"></div>
      <div class="toolbar-actions">
        <button id="dataBarToggleBtn" class="btn btn-ghost">Data bar&hellip;</button>
      </div>
      <div id="dataBarPanel" class="settingsPanel" style="display:none;"></div>
      <div class="toolbar-actions">
        <button id="trimUnitsToggleBtn" class="btn btn-ghost">Trim units&hellip;</button>
      </div>
      <div id="trimUnitsPanel" class="settingsPanel" style="display:none;"></div>
    </div>
    <div class="toolbar-actions">
      <button id="saveBtn" class="btn">Save</button>
      <button id="exportBtn" class="btn btn-primary">Export to Excel</button>
    </div>
    <!-- PDF export is the browser's own print-to-PDF (window.print(), see
         exportPrintGrid/exportPrintMobile in app.js) rather than a
         server-generated file -- it reuses the exact on-screen rendering
         instead of re-implementing the card layout in a PDF library, and
         needs no new backend dependency. Each button swaps in a different
         print-only layout (see the "@media print" rules in style.css)
         before opening the print dialog. -->
    <div class="toolbar-actions print-actions">
      <button id="printGridBtn" class="btn btn-ghost">Export PDF (grid)&hellip;</button>
      <button id="printMobileBtn" class="btn btn-ghost">Export PDF (mobile)&hellip;</button>
    </div>
    <span id="statusMsg" class="status-msg"></span>
  </aside>
  <!-- Deliberately NOT nested inside .sidebar (unlike colorPanel/
       numberingPanel above) -- .sidebar is entirely display:none for a
       view-only visitor on mobile (see body.view-only rules), which would
       take this down with it if it lived in there too, and this is the
       one settings panel a view-only visitor actually needs to reach
       (see #dataTagsToggleBtnVO in .view-only-topbar above). Floats as
       its own popover instead -- see the #dataTagsPanel rules in
       style.css -- reachable the same way from either trigger button. -->
  <div id="dataTagsPanel" class="settingsPanel" style="display:none;"></div>
  <!-- Desktop only -- a single vertically-centered grip that docks at the
       sidebar/content boundary when open and slides to the screen edge
       when collapsed (see .sidebar-toggle-tab in style.css); its icon and
       position are updated together in setSidebarCollapsed (app.js). -->
  <button id="sidebarToggleTab" class="sidebar-toggle-tab" aria-label="Hide sidebar" title="Hide sidebar">&laquo;</button>
  <main class="main-content">
    <div id="root">
      <!-- Hidden on screen, shown only in @media print (see style.css) --
           the show title/venue/date live as .content-header below the
           rest of the time, but that's hidden for print (like everything
           else outside the grid itself), so this is the one place that
           information still appears on a printed/PDF page. -->
      <div id="printHeader" class="print-header"></div>
      <!-- The lock button/popover moved here from their old fixed corner
           (see .auth-lock-btn in style.css) -- kept as .content-header's
           own direct children, not nested inside .content-header-fields
           below, specifically so they stay reachable even when
           .content-header-fields is hidden for mobile view-only (an
           anonymous mobile visitor still needs a way to sign in). -->
      <div class="content-header">
        <button id="authLockBtn" class="auth-lock-btn" type="button" aria-label="Locked"></button>
        <div id="authPopover" class="auth-popover" hidden>
          <form id="authForm">
            <input type="password" name="password" placeholder="Password" autofocus required>
            <button type="submit" class="btn btn-primary">Unlock</button>
          </form>
          <p id="authError" class="auth-error"></p>
        </div>
        <!-- The editor types these in directly; view-only mode disables
             them (see applyViewOnlyLock) and they're styled to read as
             plain text either way, not a form -- see .show-field in
             style.css. Lives at the top of the diagram area itself (not
             the sidebar) so it's visible without opening the sidebar/
             menu. Hidden for mobile view-only (see body.view-only rules)
             -- .view-only-topbar's voTitle/voMeta already cover that case
             with a compact read-only display of the same info. -->
        <div class="content-header-fields">
          <div class="show-info">
            <input id="showTitleInput" class="show-field show-title" type="text" placeholder="Show title" maxlength="120">
            <div class="show-info-line2">
              <input id="showVenueInput" class="show-field show-venue" type="text" placeholder="Venue" maxlength="120">
              <input id="showDateInput" class="show-field show-date" type="text" placeholder="Date" maxlength="40">
            </div>
          </div>
        </div>
      </div>
      <div id="emptyState" class="empty-state" style="display:none;">
        <p class="empty-title">No pinning sheet loaded yet</p>
        <p class="empty-sub">Upload a PDF or .txt export using the button above to get started.</p>
      </div>
      <!-- One tab per hang plus "All" (see renderHangTabs in app.js), so a
           long pinning sheet can be flipped through instead of scrolled. -->
      <div class="hang-tabs" id="hangTabs" style="display:none;"></div>
      <div class="grid" id="grid"></div>
    </div>
  </main>
</div>

<!-- Takes over the corner spot the lock icon uses on every other page --
     on this page specifically, the lock has moved inline into
     .content-header (before the show title), so this is what occupies
     the fixed top-right corner instead. Desktop-view-only only (see
     style.css) -- .view-only-topbar's own compact header already conveys
     this on mobile. -->
<span id="viewOnlyBanner" class="badge-view-only">View only</span>

<script src="{{ url_for('static', filename='auth.js') }}"></script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register("{{ url_for('static', filename='sw.js') }}").catch(() => {});
  });
}
</script>
</body>
</html>
