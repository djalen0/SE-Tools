<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pinning Sheet Editor</title>
<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta name="theme-color" content="#4f46e5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Pinning Sheets">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="page-topbar">
  <nav class="breadcrumb"><span class="crumb-current">Home</span></nav>
</header>
<div class="page-content">
  <h1>Shows</h1>
  <p class="page-sub">Pick a show to see its dates, or start a new one.</p>
  <div class="entity-list" id="showList"></div>
  <form class="new-entity-form" id="newShowForm">
    <input type="text" name="name" placeholder="New show name" maxlength="120" required>
    <button type="submit" class="btn btn-primary">Add show</button>
  </form>
</div>

<button id="authLockBtn" class="auth-lock-btn" type="button" aria-label="Locked"></button>
<div id="authPopover" class="auth-popover" hidden>
  <form id="authForm">
    <input type="password" name="password" placeholder="Password" autofocus required>
    <button type="submit" class="btn btn-primary">Unlock</button>
  </form>
  <p id="authError" class="auth-error"></p>
</div>

<script src="{{ url_for('static', filename='auth.js') }}"></script>
<script src="{{ url_for('static', filename='home.js') }}"></script>
</body>
</html>
