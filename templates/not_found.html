<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Not found - Pinning Sheet Editor</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="page-topbar">
  <nav class="breadcrumb"><a href="/">Home</a></nav>
</header>
<div class="page-content">
  <h1>{{ 'Show' if kind == 'show' else 'Date' }} not found</h1>
  <p class="page-sub">
    {% if kind == 'show' %}
      There's no show at this address.
    {% else %}
      There's no date at this address.
    {% endif %}
    <a href="/">Back to Home</a>.
  </p>
</div>
</body>
</html>
